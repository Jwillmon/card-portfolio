<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #F0EEE9;
  --surface: #FFFFFF;
  --border:  #E0DDD6;
  --dark:    #18181F;
  --gold:    #D4930F;
  --green:   #166534;
  --green-l: #DCFCE7;
  --red:     #9F1239;
  --red-l:   #FFE4E6;
  --blue:    #1E40AF;
  --blue-l:  #DBEAFE;
  --amber-l: #FEF3C7;
  --amber:   #92400E;
  --muted:   #A09D96;
  --sub:     #6B6860;
  --text:    #18181F;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
nav{background:var(--dark);height:62px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:2px;color:#F0B429}
.live-badge{font-size:11px;color:#555;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);padding:4px 12px;border-radius:20px}

/* KPI */
.kpis{background:var(--dark);border-bottom:3px solid #F0B429;display:grid;grid-template-columns:repeat(4,1fr)}
.kpi{padding:16px 48px;border-right:1px solid rgba(255,255,255,0.06)}
.kpi:last-child{border-right:none}
.kpi-l{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#444;margin-bottom:4px}
.kpi-v{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#fff}
.kpi-v.gold{color:#F0B429}.kpi-v.grn{color:#4ADE80}.kpi-v.red{color:#FB7185}

/* VIEWS */
#vHome,#vPlayers,#vCards{padding:40px 48px;display:none}
#vHome{display:block}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:8px;margin-bottom:28px;font-size:13px}
.bc-item{color:var(--muted);cursor:pointer;transition:color .15s}
.bc-item:hover{color:var(--text)}
.bc-sep{color:var(--border)}
.bc-cur{color:var(--text);font-weight:600}

/* SECTION LABEL */
.sec-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:24px}

/* SPORT GRID */
.sport-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.sport-tile{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:32px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;position:relative;overflow:hidden;min-height:220px}
.sport-tile::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:var(--tl,transparent);opacity:.12;transition:opacity .18s}
.sport-tile:hover{transform:translateY(-5px);box-shadow:0 20px 52px rgba(0,0,0,.12);border-color:var(--tc,var(--border))}
.sport-tile:hover::before{opacity:.22}
.st-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.st-icon{font-size:40px}
.st-pill{font-size:12px;font-weight:600;color:var(--sub);background:var(--bg);border:1px solid var(--border);padding:5px 12px;border-radius:20px}
.st-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:14px}
.st-val{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--dark);margin-bottom:10px;line-height:1}
.st-gain{display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:700;padding:6px 14px;border-radius:20px}
.st-gain.up{color:var(--green);background:var(--green-l)}.st-gain.dn{color:var(--red);background:var(--red-l)}
.st-arrow{position:absolute;bottom:28px;right:28px;width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);transition:all .18s}
.sport-tile:hover .st-arrow{background:var(--dark);color:#fff;border-color:var(--dark)}

/* PLAYER GRID */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.player-tile{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:28px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;position:relative;animation:up .25s both;min-height:190px}
.player-tile:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,.1);border-color:var(--tc,var(--border))}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pt-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:10px}
.pt-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;line-height:1.2}
.pt-count{font-size:12px;font-weight:600;color:var(--sub);background:var(--bg);border:1px solid var(--border);padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.pt-val{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--dark);margin-bottom:8px;line-height:1}
.pt-gain{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:700;padding:5px 12px;border-radius:20px;margin-bottom:14px}
.pt-gain.up{color:var(--green);background:var(--green-l)}.pt-gain.dn{color:var(--red);background:var(--red-l)}
.pt-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pt-bar-fill{height:100%;border-radius:2px;background:var(--tc,var(--gold));transition:width .4s}
.pt-arrow{position:absolute;bottom:24px;right:24px;font-size:16px;color:var(--muted);opacity:0;transition:all .15s}
.player-tile:hover .pt-arrow{opacity:1;transform:translateX(3px)}

/* SEARCH/SORT */
.toolbar{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;max-width:360px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-family:'Manrope',sans-serif;font-size:14px;padding:10px 16px;border-radius:8px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--dark)}.search::placeholder{color:var(--muted)}
.sort{background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-family:'Manrope',sans-serif;font-size:14px;padding:10px 14px;border-radius:8px;outline:none;cursor:pointer}
.count-lbl{font-size:13px;color:var(--muted);margin-left:auto}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* CARD */
.c{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .18s,box-shadow .18s;animation:up .28s both}
.c:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,0,0,.1)}
.c-stripe{height:5px}
.c-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.c-set{font-size:13px;font-weight:500;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.cond{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:4px;color:#fff;white-space:nowrap}
.gem{background:#065F46}.mint{background:#1D4ED8}.nm{background:#6D28D9}.mid{background:#B45309}.low{background:#9F1239}.raw{background:#4B5563}

.c-body{padding:18px 16px 14px}
/* Big value */
.c-val-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}
.c-val-block{}
.c-val-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.c-val{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--dark);line-height:1}
/* Gain block */
.c-gain-block{text-align:right;padding-bottom:2px}
.c-gain{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.c-gain.up{color:var(--green)}.c-gain.dn{color:var(--red)}
.c-gpct{font-size:12px;font-weight:500;margin-top:2px}
.c-gpct.up{color:var(--green)}.c-gpct.dn{color:var(--red)}

/* Stats row */
.c-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.c-stat{background:var(--bg);border-radius:8px;padding:10px 12px}
.c-stat-l{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.c-stat-v{font-size:15px;font-weight:600;color:var(--dark)}
.c-stat-v.blue{color:var(--blue)}

.c-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#FAFAF8}
.ol{font-size:11px;font-weight:700;letter-spacing:.3px;padding:4px 11px;border-radius:20px}
.ol-sb{background:var(--green-l);color:var(--green)}.ol-h{background:var(--blue-l);color:var(--blue)}
.ol-w{background:var(--amber-l);color:var(--amber)}.ol-s{background:var(--red-l);color:var(--red)}
.c-proj{font-size:12px;color:var(--muted);font-weight:500}
.c-proj b{font-weight:700;color:var(--green)}.c-proj b.neg{color:var(--red)}
.c-serial{padding:6px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);font-family:monospace;letter-spacing:.5px;background:#FAFAF8}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:320px;gap:16px}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:13px;color:var(--muted)}
.empty-msg{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

@media(max-width:640px){
  nav,#vHome,#vPlayers,#vCards{padding-left:20px;padding-right:20px}
  .kpis{grid-template-columns:repeat(2,1fr)}.kpi{padding:14px 20px}.kpi-v{font-size:18px}
  .sport-grid,.player-grid,.card-grid{grid-template-columns:1fr 1fr;gap:10px}
}
</style>
</head>
<body>

<nav>
  <div class="logo">🃏 PORTFOLIO</div>
  <div class="live-badge" id="liveBadge">Loading...</div>
</nav>

<div class="kpis">
  <div class="kpi"><div class="kpi-l">Total Value</div><div class="kpi-v gold" id="kV">—</div></div>
  <div class="kpi"><div class="kpi-l">Total Cost</div><div class="kpi-v" id="kC">—</div></div>
  <div class="kpi"><div class="kpi-l">Total Gain</div><div class="kpi-v" id="kG">—</div></div>
  <div class="kpi"><div class="kpi-l">Return</div><div class="kpi-v" id="kR">—</div></div>
</div>

<!-- VIEW: HOME (sports) -->
<div id="vHome">
  <div class="loader" id="loader"><div class="spin"></div><div class="loader-txt">Loading portfolio...</div></div>
  <div id="homeInner" style="display:none">
    <div class="sec-label">Collection by Sport</div>
    <div class="sport-grid" id="sportGrid"></div>
  </div>
</div>

<!-- VIEW: PLAYERS -->
<div id="vPlayers">
  <div class="bc">
    <span class="bc-item" onclick="goHome()">All Sports</span>
    <span class="bc-sep">›</span>
    <span class="bc-cur" id="bcSport"></span>
  </div>
  <div class="toolbar">
    <input class="search" id="playerSearch" placeholder="Search player…" oninput="renderPlayers()">
    <div class="count-lbl" id="playerCount"></div>
  </div>
  <div class="player-grid" id="playerGrid"></div>
</div>

<!-- VIEW: CARDS -->
<div id="vCards">
  <div class="bc">
    <span class="bc-item" onclick="goHome()">All Sports</span>
    <span class="bc-sep">›</span>
    <span class="bc-item" id="bcSport2" onclick="goPlayers()"></span>
    <span class="bc-sep">›</span>
    <span class="bc-cur" id="bcPlayer"></span>
  </div>
  <div class="toolbar">
    <select class="sort" id="cardSort" onchange="renderCardView()">
      <option value="val">Sort: Value ↓</option>
      <option value="gain">Sort: Gain $ ↓</option>
      <option value="year">Sort: Year ↓</option>
    </select>
    <div class="count-lbl" id="cardCount"></div>
  </div>
  <div class="card-grid" id="cardGrid"></div>
</div>

<script>
const SHEET_ID = '13_CgXI-QrFUpEbfN3muf2U-WTCFC0gh87SGwtVvbuYU';
const API_KEY  = 'AIzaSyAbgYYo19vP17EllM6sa6PyRONu4Hekw1o';
const TAB      = 'My Collection';

const SPORTS = ['Basketball','Football','Baseball','Hockey','Soccer','Golf','Tennis','Pokemon','Disney','UFC/MMA','WWE','Marvel'];
const META = {
  Basketball:{e:'🏀',c:'#1D4ED8',l:'#DBEAFE'},Football:{e:'🏈',c:'#15803D',l:'#DCFCE7'},
  Baseball:{e:'⚾',c:'#B91C1C',l:'#FEE2E2'},Hockey:{e:'🏒',c:'#1E40AF',l:'#EFF6FF'},
  Soccer:{e:'⚽',c:'#065F46',l:'#ECFDF5'},Golf:{e:'⛳',c:'#78350F',l:'#FEF3C7'},
  Tennis:{e:'🎾',c:'#4D7C0F',l:'#F7FEE7'},Pokemon:{e:'🎴',c:'#B45309',l:'#FEF3C7'},
  Disney:{e:'🎬',c:'#7E22CE',l:'#F3E8FF'},'UFC/MMA':{e:'🥊',c:'#C2410C',l:'#FFF7ED'},
  WWE:{e:'🤼',c:'#6D28D9',l:'#EDE9FE'},Marvel:{e:'🦸',c:'#9D174D',l:'#FCE7F3'},
};

let all=[], curSport=null, curPlayer=null;

const $=id=>document.getElementById(id);
const fm=v=>'$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fk=v=>v>=1000?'$'+(v/1000).toFixed(1)+'k':'$'+Math.round(v);

function condCls(c){
  const u=c.toUpperCase();
  if(u.includes('PSA 10')||u.includes('BGS 9.5')||u.includes('SGC 10'))return'gem';
  if(u.includes('PSA 9')||u.includes('BGS 9'))return'mint';
  if(u.includes('PSA 8')||u.includes('BGS 8'))return'nm';
  if(/PSA [4567]/.test(u))return'mid';
  if(u.includes('PSA')||u.includes('BGS')||u.includes('SGC'))return'low';
  return'raw';
}
function olCls(o){
  if(o==='Strong Buy')return'ol-sb';if(o==='Hold')return'ol-h';
  if(o==='Watch')return'ol-w';if(o==='Sell')return'ol-s';return'ol-h';
}
function show(id){['vHome','vPlayers','vCards'].forEach(v=>$(v).style.display=v===id?'block':'none')}

async function load(){
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(TAB)}?key=${API_KEY}`);
    if(!r.ok)throw new Error('API '+r.status);
    const d=await r.json();
    const rows=d.values||[];
    if(rows.length<3)throw new Error('No data');
    const h=rows[1].map(x=>String(x).trim());
    const ci=n=>h.indexOf(n);
    const iP=ci('Player'),iY=ci('Year'),iS=ci('Set / Variation'),iN=ci('Card #');
    const iCat=ci('Category'),iCon=ci('Condition'),iSl=ci('Slab Serial #');
    const iCost=ci('Total Cost (w/ Fees)'),iVal=ci('Current Value');
    const iG=ci('Gain $'),iGP=ci('Gain %'),iOl=ci('Market Outlook'),iPr=ci('Annual Proj. %');
    const i6=ci('6-Month Projected'),iSold=ci('SOLD?');
    all=[];
    for(let i=2;i<rows.length;i++){
      const row=rows[i];
      if(!row||!row[iP])continue;
      const pl=String(row[iP]||'').trim();
      if(!pl||pl==='TOTALS')continue;
      if(String(row[iSold]||'').trim().toUpperCase()==='SOLD')continue;
      const clean=pl.replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}⚾🏀🏈🏒⚽⛳🎾🎴🎬🥊🤼🦸🃏]\s+/u,'').trim();
      const n=s=>parseFloat(String(s||'0').replace(/[$,%]/g,''))||0;
      all.push({pl:clean,yr:String(row[iY]||'').trim(),st:String(row[iS]||'').trim(),
        num:String(row[iN]||'').trim(),cat:String(row[iCat]||'').trim(),
        con:String(row[iCon]||'').trim(),slab:String(row[iSl]||'').trim(),
        cost:n(row[iCost]),val:n(row[iVal]),gain:n(row[iG]),
        gainPct:n(row[iGP]),proj:n(row[iPr]),s6:n(row[i6]),
        ol:String(row[iOl]||'').trim()});
    }
    $('liveBadge').textContent='Live · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setKPIs(all);
    renderHome();
  }catch(e){
    $('loader').innerHTML=`<div class="empty-msg">⚠️ Could not load data<br><small style="font-size:11px;color:#aaa;display:block;margin-top:6px">${e.message}</small></div>`;
  }
}

function setKPIs(cards){
  const tv=cards.reduce((s,c)=>s+c.val,0);
  const tc=cards.reduce((s,c)=>s+c.cost,0);
  const tg=tv-tc;const ret=tc>0?tg/tc*100:0;
  $('kV').textContent='$'+tv.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  $('kC').textContent='$'+tc.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const ge=$('kG');ge.textContent=(tg>=0?'+$':'-$')+Math.abs(tg).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  ge.className='kpi-v '+(tg>=0?'grn':'red');
  const re=$('kR');re.textContent=(ret>=0?'+':'')+ret.toFixed(1)+'%';
  re.className='kpi-v '+(ret>=0?'grn':'red');
}

function renderHome(){
  $('loader').style.display='none';
  $('homeInner').style.display='block';
  const grp={};
  all.forEach(c=>{if(!grp[c.cat])grp[c.cat]=[];grp[c.cat].push(c);});
  const active=SPORTS.filter(s=>grp[s]&&grp[s].length>0);
  $('sportGrid').innerHTML=active.map(s=>{
    const cards=grp[s];
    const m=META[s]||{e:'🃏',c:'#D4930F',l:'#FEF3C7'};
    const tv=cards.reduce((x,c)=>x+c.val,0);
    const tc=cards.reduce((x,c)=>x+c.cost,0);
    const g=tv-tc;
    // Count unique players
    const players=new Set(cards.map(c=>c.pl)).size;
    return`<div class="sport-tile" style="--tc:${m.c};--tl:${m.c}" onclick="drillSport('${s}')">
      <div class="st-top">
        <span class="st-icon">${m.e}</span>
        <span class="st-pill">${players} player${players!==1?'s':''} · ${cards.length} card${cards.length!==1?'s':''}</span>
      </div>
      <div class="st-name">${s}</div>
      <div class="st-val">${fm(tv)}</div>
      <div class="st-gain ${g>=0?'up':'dn'}">${g>=0?'▲':'▼'} ${fm(Math.abs(g))}</div>
      <div class="st-arrow">→</div>
    </div>`;
  }).join('');
}

function drillSport(sport){
  curSport=sport;
  $('bcSport').textContent=sport;
  $('bcSport2').textContent=sport;
  $('playerSearch').value='';
  show('vPlayers');
  renderPlayers();
  window.scrollTo(0,0);
}

function renderPlayers(){
  const q=$('playerSearch').value.toLowerCase();
  const sportCards=all.filter(c=>c.cat===curSport);
  const m=META[curSport]||{c:'#D4930F'};

  // Group by player
  const grp={};
  sportCards.forEach(c=>{
    if(!grp[c.pl])grp[c.pl]=[];
    grp[c.pl].push(c);
  });

  let players=Object.keys(grp);
  if(q)players=players.filter(p=>p.toLowerCase().includes(q));
  // Sort by total value desc
  players.sort((a,b)=>grp[b].reduce((s,c)=>s+c.val,0)-grp[a].reduce((s,c)=>s+c.val,0));

  $('playerCount').textContent=players.length+' player'+(players.length!==1?'s':'');

  // Max value for bar scaling
  const maxVal=Math.max(...players.map(p=>grp[p].reduce((s,c)=>s+c.val,0)));

  $('playerGrid').innerHTML=players.map((pl,i)=>{
    const cards=grp[pl];
    const tv=cards.reduce((s,c)=>s+c.val,0);
    const tc=cards.reduce((s,c)=>s+c.cost,0);
    const g=tv-tc;
    const pct=maxVal>0?Math.round(tv/maxVal*100):0;
    return`<div class="player-tile" style="--tc:${m.c};animation-delay:${Math.min(i*18,400)}ms" onclick="drillPlayer('${pl.replace(/'/g,"\\'")}')">
      <div class="pt-top">
        <div class="pt-name">${pl}</div>
        <span class="pt-count">${cards.length} card${cards.length!==1?'s':''}</span>
      </div>
      <div class="pt-val">${fm(tv)}</div>
      <div class="pt-gain ${g>=0?'up':'dn'}">${g>=0?'▲':'▼'} ${fm(Math.abs(g))}</div>
      <div class="pt-bar"><div class="pt-bar-fill" style="width:${pct}%"></div></div>
      <div class="pt-arrow">→</div>
    </div>`;
  }).join('');
}

function drillPlayer(player){
  curPlayer=player;
  $('bcPlayer').textContent=player;
  $('cardSort').value='val';
  show('vCards');
  renderCardView();
  window.scrollTo(0,0);
}

function goPlayers(){
  show('vPlayers');
  renderPlayers();
  window.scrollTo(0,0);
}
function goHome(){
  curSport=null;curPlayer=null;
  show('vHome');
  window.scrollTo(0,0);
}

function renderCardView(){
  const srt=$('cardSort').value;
  const m=META[curSport]||{c:'#D4930F'};
  let cards=all.filter(c=>c.cat===curSport&&c.pl===curPlayer);
  cards.sort((a,b)=>srt==='val'?b.val-a.val:srt==='gain'?b.gain-a.gain:parseInt(b.yr)-parseInt(a.yr));
  $('cardCount').textContent=cards.length+' card'+(cards.length!==1?'s':'');

  if(!cards.length){$('cardGrid').innerHTML='<div class="empty-msg">No cards found.</div>';return;}

  $('cardGrid').innerHTML=cards.map((c,i)=>{
    const gc=c.gain>=0?'up':'dn';
    const pp=Math.round(c.proj*100);
    const gpct=(c.gainPct*100).toFixed(1);
    const setStr=[c.yr,c.st].filter(Boolean).join(' ')+(c.num?' #'+c.num:'');
    return`<div class="c" style="animation-delay:${Math.min(i*25,400)}ms">
      <div class="c-stripe" style="background:${m.c}"></div>
      <div class="c-top">
        <div class="c-set" title="${setStr}">${setStr}</div>
        <span class="cond ${condCls(c.con)}">${c.con||'RAW'}</span>
      </div>
      <div class="c-body">
        <div class="c-val-row">
          <div class="c-val-block">
            <div class="c-val-lbl">Market Value</div>
            <div class="c-val">${fm(c.val)}</div>
          </div>
          <div class="c-gain-block">
            <div class="c-gain ${gc}">${c.gain>=0?'+':'-'}${fm(Math.abs(c.gain))}</div>
            <div class="c-gpct ${gc}">${c.gain>=0?'+':''}${gpct}%</div>
          </div>
        </div>
        <div class="c-stats">
          <div class="c-stat">
            <div class="c-stat-l">Cost Basis</div>
            <div class="c-stat-v">${fm(c.cost)}</div>
          </div>
          <div class="c-stat">
            <div class="c-stat-l">6-Month Est.</div>
            <div class="c-stat-v blue">${c.s6>0?fm(c.s6):'—'}</div>
          </div>
        </div>
      </div>
      <div class="c-foot">
        <span class="ol ${olCls(c.ol)}">${c.ol||'Hold'}</span>
        <span class="c-proj">Proj <b class="${pp<0?'neg':''}">${pp>=0?'+':''}${pp}%</b>/yr</span>
      </div>
      ${c.slab?`<div class="c-serial"># ${c.slab}</div>`:''}
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
