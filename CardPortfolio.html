<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0E0F14;--card-bg:#16171E;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);--gold:#F0B429;--green:#22C55E;--red:#F43F5E;--blue:#60A5FA;--muted:#4A4B5A;--sub:#8889A0;--text:#EEEEF5}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

nav{position:sticky;top:0;z-index:200;background:rgba(14,15,20,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:1.5px;color:var(--gold)}
.nav-time{font-size:12px;color:var(--muted);background:rgba(255,255,255,0.04);padding:4px 12px;border-radius:20px;border:1px solid var(--border)}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.kpi-cell{padding:20px 40px;border-right:1px solid var(--border)}
.kpi-cell:last-child{border-right:none}
.kpi-label{font-size:11px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kpi-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.kpi-val.gold{color:var(--gold)}.kpi-val.green{color:var(--green)}.kpi-val.red{color:var(--red)}

#view-home{padding:40px}
#view-drill{padding:40px}

.home-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:24px}
.sport-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}

.sport-tile{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:24px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;position:relative;overflow:hidden}
.sport-tile::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--tc,transparent) 0%,transparent 55%);opacity:0;transition:opacity .18s}
.sport-tile:hover{transform:translateY(-4px);box-shadow:0 20px 48px rgba(0,0,0,.5)}
.sport-tile:hover::after{opacity:1}
.sport-tile:hover{border-color:var(--tc2,var(--border))}
.sport-tile.empty{opacity:.25;cursor:default;pointer-events:none}
.tile-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.tile-emoji{font-size:30px}
.tile-count{font-size:12px;color:var(--sub);background:rgba(255,255,255,0.06);padding:3px 10px;border-radius:20px}
.tile-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:8px}
.tile-val{font-family:'Syne',sans-serif;font-size:23px;font-weight:700;color:var(--gold);margin-bottom:3px}
.tile-gain{font-size:13px;font-weight:500}
.tile-gain.up{color:var(--green)}.tile-gain.dn{color:var(--red)}
.tile-arrow{position:absolute;bottom:22px;right:20px;font-size:16px;color:var(--muted);opacity:0;transition:opacity .18s,transform .18s}
.sport-tile:hover .tile-arrow{opacity:1;transform:translateX(4px)}

.drill-header{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--sub);background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.back-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
.drill-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;display:flex;align-items:center;gap:10px}
.drill-count{font-size:13px;color:var(--sub);margin-left:auto;white-space:nowrap}

.controls{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;max-width:340px;background:var(--card-bg);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px 16px;border-radius:8px;outline:none;transition:border-color .15s}
.search:focus{border-color:rgba(240,180,41,.5)}
.search::placeholder{color:var(--muted)}
.sort-sel{background:var(--card-bg);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px 14px;border-radius:8px;outline:none;cursor:pointer}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}

.c{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .18s,box-shadow .18s,border-color .18s;animation:up .28s both}
.c:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.55);border-color:rgba(255,255,255,0.14)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.c-top{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border2);background:rgba(255,255,255,0.02)}
.c-sport{font-size:15px}
.c-cond{font-size:10px;font-weight:700;letter-spacing:.6px;padding:3px 8px;border-radius:4px;color:#fff}
.gem{background:#065F46}.mint{background:#1D4ED8}.nm{background:#6D28D9}.mid{background:#B45309}.low{background:#9F1239}.raw{background:#374151}

.c-body{padding:14px}
.c-player{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;line-height:1.2;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-set{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:14px}

.c-main{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.c-val-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.c-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--gold)}
.c-gain-block{text-align:right}
.c-gain{font-size:14px;font-weight:600}
.c-gain.up{color:var(--green)}.c-gain.dn{color:var(--red)}
.c-gpct{font-size:11px;color:var(--sub);margin-top:1px}

.c-sep{height:1px;background:var(--border2);margin-bottom:12px}
.c-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.c-stat-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.c-stat-val{font-size:13px;font-weight:500}
.c-stat-val.blue{color:var(--blue)}

.c-foot{padding:9px 14px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.15)}
.ol{font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:10px;color:#fff}
.ol-sb{background:#065F46}.ol-h{background:#1D4ED8}.ol-w{background:#B45309}.ol-s{background:#9F1239}
.c-proj{font-size:11px;color:var(--sub)}
.c-proj b{color:var(--green);font-weight:600}
.c-proj b.neg{color:var(--red)}
.c-serial{padding:5px 14px;background:rgba(0,0,0,.2);border-top:1px solid var(--border2);font-size:10px;color:var(--muted);font-family:monospace;letter-spacing:.5px}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px}
.spin{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:13px;color:var(--muted)}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

@media(max-width:640px){
  nav{padding:0 20px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .kpi-cell{padding:14px 20px}
  .kpi-val{font-size:20px}
  #view-home,#view-drill{padding:16px}
  .sport-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .cards{grid-template-columns:1fr 1fr;gap:10px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🃏 PORTFOLIO</div>
  <div class="nav-time" id="navTime">Loading...</div>
</nav>

<div class="kpi-row">
  <div class="kpi-cell"><div class="kpi-label">Total Value</div><div class="kpi-val gold" id="kV">—</div></div>
  <div class="kpi-cell"><div class="kpi-label">Total Cost</div><div class="kpi-val" id="kC">—</div></div>
  <div class="kpi-cell"><div class="kpi-label">Total Gain</div><div class="kpi-val" id="kG">—</div></div>
  <div class="kpi-cell"><div class="kpi-label">Return</div><div class="kpi-val" id="kR">—</div></div>
</div>

<div id="view-home">
  <div class="loader" id="loader"><div class="spin"></div><div class="loader-txt">Loading portfolio...</div></div>
  <div id="home-inner" style="display:none">
    <div class="home-label">Collection by Sport</div>
    <div class="sport-grid" id="sportGrid"></div>
  </div>
</div>

<div id="view-drill" style="display:none">
  <div class="drill-header">
    <div class="back-btn" onclick="goHome()">← All Sports</div>
    <div class="drill-title" id="drillTitle"></div>
    <div class="drill-count" id="drillCount"></div>
  </div>
  <div class="controls">
    <input class="search" id="searchBox" placeholder="Search player or set…" oninput="renderCards()">
    <select class="sort-sel" id="sortSel" onchange="renderCards()">
      <option value="val">Sort: Value ↓</option>
      <option value="gain">Sort: Gain $ ↓</option>
      <option value="gainpct">Sort: Gain % ↓</option>
      <option value="proj">Sort: Proj % ↓</option>
      <option value="az">Sort: Player A–Z</option>
    </select>
  </div>
  <div class="cards" id="cardGrid"></div>
</div>

<script>
const SHEET_ID='13_CgXI-QrFUpEbfN3muf2U-WTCFC0gh87SGwtVvbuYU';
const API_KEY='AIzaSyAbgYYo19vP17EllM6sa6PyRONu4Hekw1o';
const TAB='My Collection';

const SPORTS=['Basketball','Football','Baseball','Hockey','Soccer','Golf','Tennis','Pokemon','Disney','UFC/MMA','WWE','Marvel'];
const META={
  Basketball:{e:'🏀',c:'#1D4ED8'},Football:{e:'🏈',c:'#15803D'},Baseball:{e:'⚾',c:'#B91C1C'},
  Hockey:{e:'🏒',c:'#1E40AF'},Soccer:{e:'⚽',c:'#065F46'},Golf:{e:'⛳',c:'#78350F'},
  Tennis:{e:'🎾',c:'#4D7C0F'},Pokemon:{e:'🎴',c:'#B45309'},Disney:{e:'🎬',c:'#7E22CE'},
  'UFC/MMA':{e:'🥊',c:'#C2410C'},WWE:{e:'🤼',c:'#6D28D9'},Marvel:{e:'🦸',c:'#9D174D'},
};

let all=[],cur=null;
const $=id=>document.getElementById(id);
const fm=v=>'$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fk=v=>v>=1000?'$'+(v/1000).toFixed(1)+'k':'$'+Math.round(v);

function condCls(c){
  const u=c.toUpperCase();
  if(u.includes('PSA 10')||u.includes('BGS 9.5')||u.includes('SGC 10'))return'gem';
  if(u.includes('PSA 9')||u.includes('BGS 9'))return'mint';
  if(u.includes('PSA 8')||u.includes('BGS 8'))return'nm';
  if(/PSA [4567]/.test(u))return'mid';
  if(u.includes('PSA')||u.includes('BGS')||u.includes('SGC'))return'low';
  return'raw';
}
function olCls(o){
  if(o==='Strong Buy')return'ol-sb';
  if(o==='Hold')return'ol-h';
  if(o==='Watch')return'ol-w';
  if(o==='Sell')return'ol-s';
  return'ol-h';
}

async function load(){
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(TAB)}?key=${API_KEY}`);
    if(!r.ok)throw new Error('API '+r.status);
    const d=await r.json();
    const rows=d.values||[];
    if(rows.length<3)throw new Error('No data');
    const h=rows[1].map(x=>String(x).trim());
    const ci=n=>h.indexOf(n);
    const iP=ci('Player'),iY=ci('Year'),iS=ci('Set / Variation'),iN=ci('Card #');
    const iCat=ci('Category'),iCon=ci('Condition'),iSl=ci('Slab Serial #');
    const iCost=ci('Total Cost (w/ Fees)'),iVal=ci('Current Value');
    const iG=ci('Gain $'),iGP=ci('Gain %'),iOl=ci('Market Outlook'),iPr=ci('Annual Proj. %');
    const i6=ci('6-Month Projected'),iSold=ci('SOLD?');
    all=[];
    for(let i=2;i<rows.length;i++){
      const row=rows[i];
      if(!row||!row[iP])continue;
      const pl=String(row[iP]||'').trim();
      if(!pl||pl==='TOTALS')continue;
      if(String(row[iSold]||'').trim().toUpperCase()==='SOLD')continue;
      const clean=pl.replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}⚾🏀🏈🏒⚽⛳🎾🎴🎬🥊🤼🦸🃏]\s+/u,'').trim();
      const n=s=>parseFloat(String(s||'0').replace(/[$,%]/g,''))||0;
      all.push({pl:clean,yr:String(row[iY]||'').trim(),st:String(row[iS]||'').trim(),
        num:String(row[iN]||'').trim(),cat:String(row[iCat]||'').trim(),
        con:String(row[iCon]||'').trim(),slab:String(row[iSl]||'').trim(),
        cost:n(row[iCost]),val:n(row[iVal]),gain:n(row[iG]),
        gainPct:n(row[iGP]),proj:n(row[iPr]),s6:n(row[i6]),
        ol:String(row[iOl]||'').trim()});
    }
    $('navTime').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    setKPIs(all);
    renderHome();
  }catch(e){
    $('loader').innerHTML=`<div class="empty">⚠️ Could not load data<br><span style="font-size:11px;color:#333;margin-top:6px;display:block">${e.message}</span></div>`;
  }
}

function setKPIs(cards){
  const tv=cards.reduce((s,c)=>s+c.val,0);
  const tc=cards.reduce((s,c)=>s+c.cost,0);
  const tg=tv-tc;
  const ret=tc>0?tg/tc*100:0;
  $('kV').textContent='$'+tv.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  $('kC').textContent='$'+tc.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const ge=$('kG');ge.textContent=(tg>=0?'+$':'-$')+Math.abs(tg).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  ge.className='kpi-val '+(tg>=0?'green':'red');
  const re=$('kR');re.textContent=(ret>=0?'+':'')+ret.toFixed(1)+'%';
  re.className='kpi-val '+(ret>=0?'green':'red');
}

function renderHome(){
  $('loader').style.display='none';
  $('home-inner').style.display='block';
  const grp={};
  all.forEach(c=>{if(!grp[c.cat])grp[c.cat]=[];grp[c.cat].push(c);});
  $('sportGrid').innerHTML=SPORTS.map(s=>{
    const cards=grp[s]||[];
    const m=META[s]||{e:'🃏',c:'#F0B429'};
    const tv=cards.reduce((x,c)=>x+c.val,0);
    const tc=cards.reduce((x,c)=>x+c.cost,0);
    const g=tv-tc;
    const empty=cards.length===0;
    return`<div class="sport-tile${empty?' empty':''}" style="--tc:${m.c}30;--tc2:${m.c}80" onclick="${empty?'':`drill('${s}')`}">
      <div class="tile-top"><span class="tile-emoji">${m.e}</span><span class="tile-count">${cards.length} card${cards.length!==1?'s':''}</span></div>
      <div class="tile-name">${s}</div>
      ${!empty?`<div class="tile-val">${fk(tv)}</div><div class="tile-gain ${g>=0?'up':'dn'}">${g>=0?'+':'-'}${fk(Math.abs(g))} gain</div>`:'<div style="color:var(--muted);font-size:12px;margin-top:4px">No cards</div>'}
      <div class="tile-arrow">→</div>
    </div>`;
  }).join('');
}

function drill(sport){
  cur=sport;
  const m=META[sport]||{e:'🃏'};
  $('drillTitle').innerHTML=`<span>${m.e}</span>${sport}`;
  $('searchBox').value='';
  $('sortSel').value='val';
  $('view-home').style.display='none';
  $('view-drill').style.display='block';
  renderCards();
  window.scrollTo(0,0);
}

function goHome(){
  cur=null;
  $('view-drill').style.display='none';
  $('view-home').style.display='block';
  window.scrollTo(0,0);
}

function renderCards(){
  const q=$('searchBox').value.toLowerCase();
  const srt=$('sortSel').value;
  let cards=all.filter(c=>c.cat===cur&&(!q||c.pl.toLowerCase().includes(q)||c.st.toLowerCase().includes(q)||c.yr.includes(q)));
  cards.sort((a,b)=>srt==='val'?b.val-a.val:srt==='gain'?b.gain-a.gain:srt==='gainpct'?b.gainPct-a.gainPct:srt==='proj'?b.proj-a.proj:a.pl.localeCompare(b.pl));
  $('drillCount').textContent=cards.length+' card'+(cards.length!==1?'s':'');
  if(!cards.length){$('cardGrid').innerHTML='<div class="empty">No cards match your search.</div>';return;}
  $('cardGrid').innerHTML=cards.map((c,i)=>{
    const gc=c.gain>=0?'up':'dn';
    const pp=Math.round(c.proj*100);
    const gpct=(c.gainPct*100).toFixed(1);
    return`<div class="c" style="animation-delay:${Math.min(i*18,450)}ms">
      <div class="c-top"><span class="c-sport">${(META[c.cat]||{e:'🃏'}).e}</span><span class="c-cond ${condCls(c.con)}">${c.con||'RAW'}</span></div>
      <div class="c-body">
        <div class="c-player" title="${c.pl}">${c.pl}</div>
        <div class="c-set">${[c.yr,c.st].filter(Boolean).join(' ')}${c.num?' #'+c.num:''}</div>
        <div class="c-main">
          <div><div class="c-val-lbl">Market Value</div><div class="c-val">${fm(c.val)}</div></div>
          <div class="c-gain-block"><div class="c-gain ${gc}">${c.gain>=0?'+':'-'}${fm(Math.abs(c.gain))}</div><div class="c-gpct">${c.gain>=0?'+':''}${gpct}%</div></div>
        </div>
        <div class="c-sep"></div>
        <div class="c-row">
          <div><div class="c-stat-lbl">Cost</div><div class="c-stat-val">${fm(c.cost)}</div></div>
          <div><div class="c-stat-lbl">6-Month</div><div class="c-stat-val blue">${c.s6>0?fm(c.s6):'—'}</div></div>
        </div>
      </div>
      <div class="c-foot">
        <span class="ol ${olCls(c.ol)}">${c.ol||'Hold'}</span>
        <span class="c-proj">Proj <b class="${pp<0?'neg':''}">${pp>=0?'+':''}${pp}%</b>/yr</span>
      </div>
      ${c.slab?`<div class="c-serial"># ${c.slab}</div>`:''}
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
