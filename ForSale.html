<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cards For Sale</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F7F4;
  --surface: #FFFFFF;
  --border: #E8E6E0;
  --dark: #1A1A24;
  --gold: #B45309;
  --green: #065F46;
  --muted: #888880;
  --subtext: #666660;
  --text: #1A1A24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

/* ── HEADER ── */
header {
  background: var(--dark);
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.logo { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; color: #F59E0B; }
.logo small { display: block; font-size: 10px; font-weight: 400; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
.contact-cta {
  font-size: 12px; color: #AAA; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12); padding: 8px 16px; border-radius: 6px;
  letter-spacing: .5px;
}

/* ── HERO STRIP ── */
.hero {
  background: var(--dark);
  padding: 0 32px 24px;
  border-bottom: 3px solid #F59E0B;
}
.hero-title { font-family: 'Oswald', sans-serif; font-size: 38px; font-weight: 700; letter-spacing: 2px; color: #FFF; line-height: 1; }
.hero-sub { font-size: 13px; color: #888; margin-top: 6px; letter-spacing: .5px; }
.hero-stats { display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
.hero-stat { }
.hero-stat-val { font-family: 'Oswald', sans-serif; font-size: 20px; color: #F59E0B; }
.hero-stat-lbl { font-size: 11px; color: #666; letter-spacing: .8px; text-transform: uppercase; }

/* ── CONTROLS ── */
.controls {
  padding: 16px 32px;
  background: #FFF;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.search-box {
  flex: 1; min-width: 200px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px;
  padding: 8px 14px; border-radius: 6px; outline: none;
  transition: border-color .2s;
}
.search-box:focus { border-color: var(--gold); }
.search-box::placeholder { color: var(--muted); }
.filter-btn {
  font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 500;
  padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--subtext); cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--gold); color: var(--gold); }
.filter-btn.active { background: var(--dark); color: #F59E0B; border-color: var(--dark); }
.sort-select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px;
  padding: 8px 12px; border-radius: 6px; outline: none; cursor: pointer;
}
.result-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

/* ── SPORT SECTIONS ── */
#main { padding: 28px 32px; }

.sport-section { margin-bottom: 40px; }
.sport-heading {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}
.sport-heading-icon { font-size: 22px; }
.sport-heading-name { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 600; letter-spacing: 1px; }
.sport-heading-count { font-size: 13px; color: var(--muted); margin-left: auto; }

/* ── CARD GRID ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  transition: all .2s;
  animation: fadeUp .3s both;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.1); border-color: #C4B5A0; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.card-top {
  background: var(--dark);
  padding: 10px 12px 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.card-sport-icon { font-size: 16px; }
.card-condition {
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
  padding: 3px 8px; border-radius: 4px; color: #fff;
}
.cond-gem  { background: #065F46; }
.cond-mint { background: #1A56DB; }
.cond-nm   { background: #5B21B6; }
.cond-mid  { background: #B45309; }
.cond-low  { background: #991B1B; }
.cond-raw  { background: #4B5563; }

.card-body { padding: 12px 12px 10px; }
.card-player {
  font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 600;
  letter-spacing: .3px; line-height: 1.2; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-set { font-size: 11px; color: var(--subtext); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 12px; }

.card-price-row {
  display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
}
.card-price {
  font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--green);
}
.card-price-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }

.card-footer {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: #FAFAF8;
}
.card-num { font-size: 11px; color: var(--muted); }
.card-slab { font-size: 10px; color: var(--muted); font-family: monospace; }

.inquire-btn {
  display: block; width: 100%;
  font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px;
  text-align: center; padding: 10px;
  background: var(--dark); color: #F59E0B;
  border: none; cursor: pointer;
  transition: background .15s;
}
.inquire-btn:hover { background: #2A2A34; }

/* ── EMPTY / LOADING ── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 14px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--muted); }
.empty-section { font-size: 13px; color: var(--muted); padding: 20px 0; }

/* ── FOOTER ── */
footer {
  background: var(--dark); color: #555; font-size: 12px;
  text-align: center; padding: 20px 32px; margin-top: 40px; letter-spacing: .5px;
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  header, .hero, #main { padding-left: 16px; padding-right: 16px; }
  .hero-title { font-size: 28px; }
  .controls { padding: 12px 16px; }
  .card-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🃏 CARD PORTFOLIO <small>Cards For Sale</small></div>
  <div class="contact-cta">📩 DM to inquire on any card</div>
</header>

<div class="hero">
  <div class="hero-title">CARDS FOR SALE</div>
  <div class="hero-sub">Graded & Raw — All cards priced to move</div>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-val" id="hCount">—</div>
      <div class="hero-stat-lbl">Cards Listed</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-val" id="hSports">—</div>
      <div class="hero-stat-lbl">Sports</div>
    </div>
  </div>
</div>

<div class="controls">
  <input class="search-box" id="searchBox" placeholder="Search player, set, year..." oninput="render()">
  <button class="filter-btn active" data-sport="ALL" onclick="setFilter('ALL')">All</button>
  <div id="sportFilters"></div>
  <select class="sort-select" id="sortSelect" onchange="render()">
    <option value="price">Price ↓</option>
    <option value="player">Player A–Z</option>
    <option value="year">Year ↓</option>
  </select>
  <span class="result-count" id="resultCount"></span>
</div>

<div id="main">
  <div class="loading" id="loadingMsg">
    <div class="spinner"></div>
    <div class="loading-text">Loading cards...</div>
  </div>
  <div id="content" style="display:none"></div>
</div>

<footer>
  All prices reflect current market value · Updated automatically from live data · Midland, TX
</footer>

<script>
// ── CONFIG ── update these ──────────────────────────────────
const SHEET_ID   = '13_CgXI-QrFUpEbfN3muf2U-WTCFC0gh87SGwtVvbuYU';
const API_KEY    = 'AIzaSyD5TtOBQlYPAP9MR-ZGZqRfiiCQ5e3FXCA';
const SHEET_NAME = 'For Sale';
// ────────────────────────────────────────────────────────────

const SPORT_META = {
  'Basketball': { icon: '🏀' },
  'Football':   { icon: '🏈' },
  'Baseball':   { icon: '⚾' },
  'Hockey':     { icon: '🏒' },
  'Soccer':     { icon: '⚽' },
  'Golf':       { icon: '⛳' },
  'Tennis':     { icon: '🎾' },
  'Pokemon':    { icon: '🎴' },
  'Disney':     { icon: '🎬' },
  'UFC/MMA':    { icon: '🥊' },
  'WWE':        { icon: '🤼' },
  'Marvel':     { icon: '🦸' },
};
const SPORT_ORDER = ['Basketball','Football','Baseball','Hockey','Soccer','Golf','Tennis','Pokemon','Disney','UFC/MMA','WWE','Marvel'];

let allCards = [];
let activeSport = 'ALL';

function $m(v) { return '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function condClass(c) {
  const u = c.toUpperCase();
  if (u.includes('PSA 10') || u.includes('BGS 9.5') || u.includes('SGC 10')) return 'cond-gem';
  if (u.includes('PSA 9')  || u.includes('BGS 9'))  return 'cond-mint';
  if (u.includes('PSA 8')  || u.includes('BGS 8'))  return 'cond-nm';
  if (/PSA [4567]/.test(u)) return 'cond-mid';
  if (u.includes('PSA') || u.includes('BGS') || u.includes('SGC')) return 'cond-low';
  return 'cond-raw';
}

async function loadData() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Could not load sheet');
    const data = await res.json();
    const rows = data.values || [];
    if (rows.length < 2) throw new Error('No data found');

    const hdrs = rows[1].map(h => String(h).trim());
    const ci = name => hdrs.indexOf(name);

    const iPlayer  = ci('Player');
    const iYear    = ci('Year');
    const iSet     = ci('Set / Variation');
    const iCardNum = ci('Card #');
    const iCat     = ci('Category');
    const iCond    = ci('Condition');
    const iSlab    = ci('Slab Serial #');
    const iVal     = ci('Current Value');
    const iShow    = ci('Show Price');
    const iMin     = ci('Min Sell Price');
    const iSold    = ci('SOLD?');

    allCards = [];
    for (let r = 2; r < rows.length; r++) {
      const row = rows[r];
      if (!row || !row[iPlayer]) continue;
      const player = String(row[iPlayer] || '').trim();
      if (!player || player === 'TOTALS') continue;
      const cleanPlayer = player.replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}⚾🏀🏈🏒⚽⛳🎾🎴🎬🥊🤼🦸🃏]\s+/u, '').trim();

      const sold = String(row[iSold] || '').trim().toUpperCase();
      if (sold === 'SOLD') continue;

      const val   = parseFloat(String(row[iVal]  || '0').replace(/[$,]/g,'')) || 0;
      const show  = parseFloat(String(row[iShow] || '0').replace(/[$,]/g,'')) || 0;
      const min   = parseFloat(String(row[iMin]  || '0').replace(/[$,]/g,'')) || 0;
      const price = show > 0 ? show : val;

      allCards.push({
        player: cleanPlayer,
        year:   String(row[iYear]    || '').trim(),
        set:    String(row[iSet]     || '').trim(),
        num:    String(row[iCardNum] || '').trim(),
        cat:    String(row[iCat]     || '').trim(),
        cond:   String(row[iCond]    || '').trim(),
        slab:   String(row[iSlab]    || '').trim(),
        val, show, min, price,
      });
    }

    // Hero stats
    const sports = [...new Set(allCards.map(c => c.cat))].filter(Boolean);
    document.getElementById('hCount').textContent = allCards.length;
    document.getElementById('hSports').textContent = sports.length;

    // Build sport filter buttons
    const filtersEl = document.getElementById('sportFilters');
    const activeSports = SPORT_ORDER.filter(s => allCards.some(c => c.cat === s));
    filtersEl.innerHTML = activeSports.map(s => {
      const m = SPORT_META[s] || { icon: '🃏' };
      return `<button class="filter-btn" data-sport="${s}" onclick="setFilter('${s}')">${m.icon} ${s}</button>`;
    }).join('');

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render();

  } catch(e) {
    document.getElementById('loadingMsg').innerHTML = `<div class="empty-section">⚠️ ${e.message}</div>`;
  }
}

function setFilter(sport) {
  activeSport = sport;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sport === sport);
  });
  render();
}

function render() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let cards = allCards.filter(c => {
    const matchSport = activeSport === 'ALL' || c.cat === activeSport;
    const matchQ = !q || c.player.toLowerCase().includes(q) || c.set.toLowerCase().includes(q) || c.year.includes(q);
    return matchSport && matchQ;
  });

  cards.sort((a, b) => {
    if (sort === 'price')  return b.price - a.price;
    if (sort === 'player') return a.player.localeCompare(b.player);
    if (sort === 'year')   return parseInt(b.year) - parseInt(a.year);
    return 0;
  });

  document.getElementById('resultCount').textContent = cards.length + ' card' + (cards.length !== 1 ? 's' : '');

  // Group by sport for display
  const grouped = {};
  cards.forEach(c => {
    if (!grouped[c.cat]) grouped[c.cat] = [];
    grouped[c.cat].push(c);
  });

  const sportsToShow = activeSport === 'ALL'
    ? SPORT_ORDER.filter(s => grouped[s])
    : [activeSport];

  const content = document.getElementById('content');
  if (!cards.length) {
    content.innerHTML = '<div class="empty-section">No cards match your search.</div>';
    return;
  }

  content.innerHTML = sportsToShow.map(sport => {
    const sportCards = grouped[sport] || [];
    if (!sportCards.length) return '';
    const meta = SPORT_META[sport] || { icon: '🃏' };

    const cardsHtml = sportCards.map((c, i) => {
      const setDisplay = [c.year, c.set].filter(Boolean).join(' ');
      return `<div class="card" style="animation-delay:${Math.min(i*20,400)}ms">
        <div class="card-top">
          <span class="card-sport-icon">${meta.icon}</span>
          <span class="card-condition ${condClass(c.cond)}">${c.cond || 'RAW'}</span>
        </div>
        <div class="card-body">
          <div class="card-player" title="${c.player}">${c.player}</div>
          <div class="card-set" title="${setDisplay}">${setDisplay}${c.num ? ' #'+c.num : ''}</div>
          <div class="card-price-row">
            <div>
              <div class="card-price-label">Asking Price</div>
              <div class="card-price">${$m(c.price)}</div>
            </div>
            ${c.min > 0 ? `<div style="text-align:right">
              <div class="card-price-label">Min Accept</div>
              <div style="font-family:'Oswald',sans-serif;font-size:15px;color:#B45309">${$m(c.min)}</div>
            </div>` : ''}
          </div>
        </div>
        <div class="card-footer">
          ${c.num ? `<span class="card-num">Card #${c.num}</span>` : '<span></span>'}
          ${c.slab ? `<span class="card-slab">${c.slab}</span>` : ''}
        </div>
        <button class="inquire-btn">INQUIRE</button>
      </div>`;
    }).join('');

    return `<div class="sport-section">
      <div class="sport-heading">
        <span class="sport-heading-icon">${meta.icon}</span>
        <span class="sport-heading-name">${sport}</span>
        <span class="sport-heading-count">${sportCards.length} card${sportCards.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="card-grid">${cardsHtml}</div>
    </div>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
