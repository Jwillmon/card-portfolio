<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #F2F0EB;
  --surface:  #FFFFFF;
  --border:   #E2DED6;
  --dark:     #1A1A22;
  --gold:     #C8860A;
  --gold-lt:  #FEF3C7;
  --green:    #15803D;
  --green-lt: #DCFCE7;
  --red:      #BE123C;
  --red-lt:   #FFE4E6;
  --blue:     #1D4ED8;
  --blue-lt:  #DBEAFE;
  --muted:    #9B9790;
  --sub:      #6B6860;
  --text:     #1A1A22;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ── NAV ── */
nav {
  background: var(--dark);
  padding: 0 48px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.nav-logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 2px; color: #F0B429; }
.nav-badge { font-size: 11px; color: #666; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; letter-spacing: .5px; }

/* ── KPI BAR ── */
.kpi-row { display: grid; grid-template-columns: repeat(4,1fr); background: var(--dark); border-bottom: 3px solid #F0B429; }
.kpi-cell { padding: 18px 48px; border-right: 1px solid rgba(255,255,255,0.07); }
.kpi-cell:last-child { border-right: none; }
.kpi-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #555; margin-bottom: 5px; }
.kpi-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: #FFF; }
.kpi-val.gold  { color: #F0B429; }
.kpi-val.green { color: #4ADE80; }
.kpi-val.red   { color: #FB7185; }

/* ── MAIN ── */
#view-home  { padding: 48px; }
#view-drill { padding: 48px; }

/* ── HOME ── */
.home-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }

.sport-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

.sport-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  position: relative; overflow: hidden;
}
.sport-tile:hover { transform: translateY(-5px); box-shadow: 0 20px 48px rgba(0,0,0,.12); border-color: var(--tc, var(--border)); }
.sport-tile::before { content: ''; position: absolute; top: 0; right: 0; width: 120px; height: 120px; background: radial-gradient(circle at top right, var(--tc2, transparent), transparent 70%); border-radius: 0 16px 0 0; }

.tile-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.tile-emoji { font-size: 36px; line-height: 1; }
.tile-pill { font-size: 11px; font-weight: 600; color: var(--sub); background: var(--bg); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; }
.tile-sport { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 10px; }
.tile-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--dark); margin-bottom: 4px; }
.tile-gain { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.tile-gain.up { color: var(--green); background: var(--green-lt); }
.tile-gain.dn { color: var(--red);   background: var(--red-lt); }
.tile-caret { position: absolute; bottom: 24px; right: 24px; width: 32px; height: 32px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--muted); transition: all .2s; }
.sport-tile:hover .tile-caret { background: var(--dark); color: #FFF; border-color: var(--dark); transform: translateX(3px); }

/* ── DRILL HEADER ── */
.drill-top { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
.back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--sub); background: var(--surface); border: 1px solid var(--border); padding: 9px 18px; border-radius: 8px; cursor: pointer; transition: all .15s; }
.back-btn:hover { background: var(--dark); color: #FFF; border-color: var(--dark); }
.drill-heading { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.drill-count { font-size: 13px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 5px 14px; border-radius: 20px; margin-left: auto; }

/* ── CONTROLS ── */
.controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.search {
  flex: 1; min-width: 220px; max-width: 380px;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 11px 16px; border-radius: 8px; outline: none; transition: border-color .15s;
}
.search:focus { border-color: var(--dark); }
.search::placeholder { color: var(--muted); }
.sort-sel {
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 11px 14px; border-radius: 8px; outline: none; cursor: pointer;
}

/* ── CARD GRID ── */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; }

/* ── CARD ── */
.c {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  animation: fadeUp .3s both;
}
.c:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.1); }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* card header band */
.c-band {
  height: 6px;
  background: var(--band-color, #E2DED6);
}

.c-head {
  padding: 14px 16px 12px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
.c-player { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.c-cond { font-size: 10px; font-weight: 700; letter-spacing: .5px; padding: 3px 8px; border-radius: 4px; color: #fff; white-space: nowrap; }
.gem  { background: #065F46; }
.mint { background: #1D4ED8; }
.nm   { background: #6D28D9; }
.mid  { background: #B45309; }
.low  { background: #9F1239; }
.raw  { background: #4B5563; }

.c-set { padding: 10px 16px 14px; font-size: 12px; color: var(--sub); border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.c-body { padding: 16px; }

/* value + gain row */
.c-vg { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
.c-val-lbl { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.c-val { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--dark); }
.c-gain-block { text-align: right; }
.c-gain { font-size: 14px; font-weight: 700; }
.c-gain.up { color: var(--green); }
.c-gain.dn { color: var(--red); }
.c-gpct { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* mini stats */
.c-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.c-stat { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
.c-stat-lbl { font-size: 10px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.c-stat-val { font-size: 14px; font-weight: 600; color: var(--dark); }
.c-stat-val.blue { color: var(--blue); }

/* footer */
.c-foot { padding: 11px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #FAFAF8; }
.ol { font-size: 10px; font-weight: 700; letter-spacing: .4px; padding: 4px 10px; border-radius: 20px; }
.ol-sb { background: var(--green-lt); color: var(--green); }
.ol-h  { background: var(--blue-lt);  color: var(--blue); }
.ol-w  { background: #FEF3C7; color: #92400E; }
.ol-s  { background: var(--red-lt);   color: var(--red); }
.c-proj { font-size: 12px; color: var(--muted); }
.c-proj b { font-weight: 700; color: var(--green); }
.c-proj b.neg { color: var(--red); }

.c-serial { padding: 6px 16px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); font-family: monospace; letter-spacing: .5px; background: #FAFAF8; }

/* ── LOADER / EMPTY ── */
.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 320px; gap: 16px; }
.spin { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-txt { font-size: 13px; color: var(--muted); }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  nav { padding: 0 20px; }
  .kpi-row { grid-template-columns: repeat(2,1fr); }
  .kpi-cell { padding: 14px 20px; }
  .kpi-val { font-size: 18px; }
  #view-home, #view-drill { padding: 20px; }
  .sport-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .sport-tile { padding: 18px; }
  .cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🃏 PORTFOLIO</div>
  <div class="nav-badge" id="navTime">Loading...</div>
</nav>

<div class="kpi-row">
  <div class="kpi-cell"><div class="kpi-label">Total Value</div><div class="kpi-val gold" id="kV">—</div></div>
  <div class="kpi-cell"><div class="kpi-label">Total Cost</div><div class="kpi-val" id="kC">—</div></div>
  <div class="kpi-cell"><div class="kpi-label">Total Gain</div><div class="kpi-val" id="kG">—</div></div>
  <div class="kpi-cell"><div class="kpi-label">Return</div><div class="kpi-val" id="kR">—</div></div>
</div>

<div id="view-home">
  <div class="loader" id="loader"><div class="spin"></div><div class="loader-txt">Loading your portfolio...</div></div>
  <div id="home-inner" style="display:none">
    <div class="home-eyebrow">Collection by Sport</div>
    <div class="sport-grid" id="sportGrid"></div>
  </div>
</div>

<div id="view-drill" style="display:none">
  <div class="drill-top">
    <div class="back-btn" onclick="goHome()">← All Sports</div>
    <div class="drill-heading" id="drillTitle"></div>
    <div class="drill-count" id="drillCount"></div>
  </div>
  <div class="controls">
    <input class="search" id="searchBox" placeholder="Search player or set…" oninput="renderCards()">
    <select class="sort-sel" id="sortSel" onchange="renderCards()">
      <option value="val">Sort: Value ↓</option>
      <option value="gain">Sort: Gain $ ↓</option>
      <option value="gainpct">Sort: Gain % ↓</option>
      <option value="proj">Sort: Proj % ↓</option>
      <option value="az">Sort: Player A–Z</option>
    </select>
  </div>
  <div class="cards" id="cardGrid"></div>
</div>

<script>
const SHEET_ID = '13_CgXI-QrFUpEbfN3muf2U-WTCFC0gh87SGwtVvbuYU';
const API_KEY  = 'AIzaSyAbgYYo19vP17EllM6sa6PyRONu4Hekw1o';
const TAB      = 'My Collection';

const SPORTS = ['Basketball','Football','Baseball','Hockey','Soccer','Golf','Tennis','Pokemon','Disney','UFC/MMA','WWE','Marvel'];
const META = {
  Basketball: { e:'🏀', c:'#1D4ED8', lt:'#DBEAFE' },
  Football:   { e:'🏈', c:'#15803D', lt:'#DCFCE7' },
  Baseball:   { e:'⚾', c:'#B91C1C', lt:'#FEE2E2' },
  Hockey:     { e:'🏒', c:'#1E40AF', lt:'#EFF6FF' },
  Soccer:     { e:'⚽', c:'#065F46', lt:'#ECFDF5' },
  Golf:       { e:'⛳', c:'#78350F', lt:'#FEF3C7' },
  Tennis:     { e:'🎾', c:'#4D7C0F', lt:'#F7FEE7' },
  Pokemon:    { e:'🎴', c:'#B45309', lt:'#FEF3C7' },
  Disney:     { e:'🎬', c:'#7E22CE', lt:'#F3E8FF' },
  'UFC/MMA':  { e:'🥊', c:'#C2410C', lt:'#FFF7ED' },
  WWE:        { e:'🤼', c:'#6D28D9', lt:'#EDE9FE' },
  Marvel:     { e:'🦸', c:'#9D174D', lt:'#FCE7F3' },
};

let all = [], cur = null;
const $ = id => document.getElementById(id);
const fm = v => '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const fk = v => v >= 1000 ? '$' + (v/1000).toFixed(1) + 'k' : '$' + Math.round(v);

function condCls(c) {
  const u = c.toUpperCase();
  if (u.includes('PSA 10') || u.includes('BGS 9.5') || u.includes('SGC 10')) return 'gem';
  if (u.includes('PSA 9')  || u.includes('BGS 9'))  return 'mint';
  if (u.includes('PSA 8')  || u.includes('BGS 8'))  return 'nm';
  if (/PSA [4567]/.test(u)) return 'mid';
  if (u.includes('PSA') || u.includes('BGS') || u.includes('SGC')) return 'low';
  return 'raw';
}
function olCls(o) {
  if (o === 'Strong Buy') return 'ol-sb';
  if (o === 'Hold')       return 'ol-h';
  if (o === 'Watch')      return 'ol-w';
  if (o === 'Sell')       return 'ol-s';
  return 'ol-h';
}

async function load() {
  try {
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(TAB)}?key=${API_KEY}`);
    if (!r.ok) throw new Error('API error ' + r.status);
    const d = await r.json();
    const rows = d.values || [];
    if (rows.length < 3) throw new Error('No data');

    const h = rows[1].map(x => String(x).trim());
    const ci = n => h.indexOf(n);
    const iP=ci('Player'), iY=ci('Year'), iS=ci('Set / Variation'), iN=ci('Card #');
    const iCat=ci('Category'), iCon=ci('Condition'), iSl=ci('Slab Serial #');
    const iCost=ci('Total Cost (w/ Fees)'), iVal=ci('Current Value');
    const iG=ci('Gain $'), iGP=ci('Gain %'), iOl=ci('Market Outlook'), iPr=ci('Annual Proj. %');
    const i6=ci('6-Month Projected'), iSold=ci('SOLD?');

    all = [];
    for (let i = 2; i < rows.length; i++) {
      const row = rows[i];
      if (!row || !row[iP]) continue;
      const pl = String(row[iP] || '').trim();
      if (!pl || pl === 'TOTALS') continue;
      if (String(row[iSold] || '').trim().toUpperCase() === 'SOLD') continue;
      const clean = pl.replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}⚾🏀🏈🏒⚽⛳🎾🎴🎬🥊🤼🦸🃏]\s+/u, '').trim();
      const n = s => parseFloat(String(s||'0').replace(/[$,%]/g,'')) || 0;
      all.push({
        pl: clean, yr: String(row[iY]||'').trim(), st: String(row[iS]||'').trim(),
        num: String(row[iN]||'').trim(), cat: String(row[iCat]||'').trim(),
        con: String(row[iCon]||'').trim(), slab: String(row[iSl]||'').trim(),
        cost: n(row[iCost]), val: n(row[iVal]), gain: n(row[iG]),
        gainPct: n(row[iGP]), proj: n(row[iPr]), s6: n(row[i6]),
        ol: String(row[iOl]||'').trim(),
      });
    }

    $('navTime').textContent = 'Live · ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    setKPIs(all);
    renderHome();
  } catch(e) {
    $('loader').innerHTML = `<div class="empty">⚠️ Could not load data<br><small style="font-size:11px;color:#aaa;margin-top:6px;display:block">${e.message}</small></div>`;
  }
}

function setKPIs(cards) {
  const tv = cards.reduce((s,c) => s+c.val, 0);
  const tc = cards.reduce((s,c) => s+c.cost, 0);
  const tg = tv - tc;
  const ret = tc > 0 ? tg/tc*100 : 0;
  $('kV').textContent = '$' + tv.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  $('kC').textContent = '$' + tc.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  const ge = $('kG');
  ge.textContent = (tg>=0?'+$':'-$') + Math.abs(tg).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  ge.className = 'kpi-val ' + (tg>=0?'green':'red');
  const re = $('kR');
  re.textContent = (ret>=0?'+':'') + ret.toFixed(1) + '%';
  re.className = 'kpi-val ' + (ret>=0?'green':'red');
}

function renderHome() {
  $('loader').style.display = 'none';
  $('home-inner').style.display = 'block';
  const grp = {};
  all.forEach(c => { if (!grp[c.cat]) grp[c.cat] = []; grp[c.cat].push(c); });

  // Only show sports that have cards
  const activeSports = SPORTS.filter(s => grp[s] && grp[s].length > 0);

  $('sportGrid').innerHTML = activeSports.map(s => {
    const cards = grp[s];
    const m = META[s] || { e:'🃏', c:'#C8860A', lt:'#FEF3C7' };
    const tv = cards.reduce((x,c) => x+c.val, 0);
    const tc = cards.reduce((x,c) => x+c.cost, 0);
    const g  = tv - tc;
    return `<div class="sport-tile" style="--tc:${m.c};--tc2:${m.lt}" onclick="drill('${s}')">
      <div class="tile-top">
        <span class="tile-emoji">${m.e}</span>
        <span class="tile-pill">${cards.length} card${cards.length!==1?'s':''}</span>
      </div>
      <div class="tile-sport">${s}</div>
      <div class="tile-value">${fk(tv)}</div>
      <div class="tile-gain ${g>=0?'up':'dn'}">${g>=0?'↑':' ↓'} ${fk(Math.abs(g))}</div>
      <div class="tile-caret">→</div>
    </div>`;
  }).join('');
}

function drill(sport) {
  cur = sport;
  const m = META[sport] || { e:'🃏' };
  $('drillTitle').innerHTML = `<span>${m.e}</span> ${sport}`;
  $('searchBox').value = '';
  $('sortSel').value = 'val';
  $('view-home').style.display = 'none';
  $('view-drill').style.display = 'block';
  renderCards();
  window.scrollTo(0, 0);
}

function goHome() {
  cur = null;
  $('view-drill').style.display = 'none';
  $('view-home').style.display = 'block';
  window.scrollTo(0, 0);
}

function renderCards() {
  const q = $('searchBox').value.toLowerCase();
  const srt = $('sortSel').value;
  let cards = all.filter(c => c.cat === cur && (!q || c.pl.toLowerCase().includes(q) || c.st.toLowerCase().includes(q) || c.yr.includes(q)));
  cards.sort((a,b) =>
    srt==='val'?b.val-a.val : srt==='gain'?b.gain-a.gain :
    srt==='gainpct'?b.gainPct-a.gainPct : srt==='proj'?b.proj-a.proj :
    a.pl.localeCompare(b.pl)
  );
  $('drillCount').textContent = cards.length + ' card' + (cards.length!==1?'s':'');
  if (!cards.length) { $('cardGrid').innerHTML = '<div class="empty">No cards match your search.</div>'; return; }

  const m = META[cur] || { c:'#C8860A' };

  $('cardGrid').innerHTML = cards.map((c, i) => {
    const gc = c.gain >= 0 ? 'up' : 'dn';
    const pp = Math.round(c.proj * 100);
    const gpct = (c.gainPct * 100).toFixed(1);
    const setStr = [c.yr, c.st].filter(Boolean).join(' ') + (c.num ? ' #'+c.num : '');
    return `<div class="c" style="animation-delay:${Math.min(i*20,480)}ms">
      <div class="c-band" style="--band-color:${m.c}"></div>
      <div class="c-head">
        <div class="c-player" title="${c.pl}">${c.pl}</div>
        <span class="c-cond ${condCls(c.con)}">${c.con||'RAW'}</span>
      </div>
      <div class="c-set">${setStr}</div>
      <div class="c-body">
        <div class="c-vg">
          <div>
            <div class="c-val-lbl">Market Value</div>
            <div class="c-val">${fm(c.val)}</div>
          </div>
          <div class="c-gain-block">
            <div class="c-gain ${gc}">${c.gain>=0?'+':'-'}${fm(Math.abs(c.gain))}</div>
            <div class="c-gpct">${c.gain>=0?'+':''}${gpct}%</div>
          </div>
        </div>
        <div class="c-stats">
          <div class="c-stat">
            <div class="c-stat-lbl">Cost</div>
            <div class="c-stat-val">${fm(c.cost)}</div>
          </div>
          <div class="c-stat">
            <div class="c-stat-lbl">6-Month</div>
            <div class="c-stat-val blue">${c.s6>0?fm(c.s6):'—'}</div>
          </div>
        </div>
      </div>
      <div class="c-foot">
        <span class="ol ${olCls(c.ol)}">${c.ol||'Hold'}</span>
        <span class="c-proj">Proj <b class="${pp<0?'neg':''}">${pp>=0?'+':''}${pp}%</b>/yr</span>
      </div>
      ${c.slab ? `<div class="c-serial"># ${c.slab}</div>` : ''}
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
